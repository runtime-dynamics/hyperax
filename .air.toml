root = "."
testdata_dir = "testdata"
tmp_dir = ".build"

[build]
  args_bin = ["serve", "--log=.build/run.log"]
  bin = ""
  cmd = "./build.sh"
  pre_cmd = []
  delay = 10
  env = ["DEBUG=true"]
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "node_modules", ".git", ".idea", ".vscode", "static", ".claude", "ui/dist", "ui/node_modules"]
  exclude_file = []
  exclude_regex = ["_test.go", "_templ.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ".build/hyperax serve"
  include_dir = ["cmd", "internal", "pkg", "ui/src"]
  include_ext = ["go", "tpl", "tmpl", "ts", "tsx", "css", "html"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = true
  log = "app.log"

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
